<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CozyCabin M-Pesa Payment</title>
<style>
    :root {
        --gold: #d4af37;
        --mpesa-green: #009e49;
        --bg: #050505;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }

    body {
        background: var(--bg);
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .mpesa-container {
        width: 100%;
        max-width: 420px;
        background: #0d0d0d;
        border: 1px solid #333;
        border-radius: 30px;
        padding: 30px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.8);
    }

    .logo {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 20px;
        border: 2px solid var(--gold);
        margin-bottom: 20px;
    }

    .title { color: var(--gold); font-size: 1.8rem; font-weight: 800; margin-bottom: 25px; letter-spacing: 1px; }

    .green-box {
        background: linear-gradient(145deg, var(--mpesa-green), #007a38);
        padding: 25px;
        border-radius: 25px;
    }

    .payment-card {
        background: rgba(0,0,0,0.2);
        padding: 15px;
        border-radius: 15px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: 0.3s;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .payment-card:hover { background: rgba(0,0,0,0.3); }

    .payment-label { font-size: 0.8rem; opacity: 0.8; text-transform: uppercase; margin-bottom: 4px; }
    .payment-number { font-size: 1.8rem; font-weight: 900; }

    .pochi-box {
        background: rgba(0,0,0,0.4);
        border: 1px dashed var(--gold);
        border-radius: 15px;
        padding: 15px;
        margin: 20px 0;
        cursor: pointer;
    }

    input {
        width: 100%;
        padding: 15px;
        border: 1px solid #444;
        border-radius: 12px;
        background: #000;
        color: white;
        text-align: center;
        font-size: 1rem;
        margin-bottom: 15px;
    }

    .verify-btn {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 12px;
        background: #fff;
        color: #009e49;
        font-weight: 900;
        cursor: pointer;
        transition: 0.3s;
    }

    .verify-btn:hover { background: #f0f0f0; transform: scale(1.02); }

    .back-btn { margin-top: 25px; color: #666; text-decoration: none; font-size: 0.9rem; }
</style>
</head>

<body>
<div class="mpesa-container">
    <img src="Images/Cozycabin log .webp" class="logo" alt="logo">
    <div class="title">KES PAYMENT</div>

    <div class="green-box">
        <div style="margin-bottom:20px; font-weight:bold;">LIPA NA M-PESA</div>

        <div class="payment-card" onclick="copy('542542')">
            <div class="payment-label">Paybill (Tap to Copy)</div>
            <div class="payment-number">542542</div>
        </div>

        <div class="payment-card" onclick="copy('702468')">
            <div class="payment-label">Account (Tap to Copy)</div>
            <div class="payment-number">702468</div>
        </div>

        <div class="pochi-box" onclick="copy('0702468460')">
            <div style="font-size:0.8rem; margin-bottom:5px;">POCHI LA BIASHARA (Tap to Copy)</div>
            <div style="color:#00ff95; font-size:1.4rem; font-weight:900;">0702468460</div>
        </div>

        <input type="text" id="mpesa-code" placeholder="Enter Transaction Code">
        <button class="verify-btn" onclick="verifyPayment()">VERIFY PAYMENT</button>
        <div class="success" id="success-message" style="margin-top:15px; display:none;">✅ Submitted Successfully</div>
    </div>

    <a href="practice.html" class="back-btn">← Back</a>
</div>

<script>
    function copy(text) {
        navigator.clipboard.writeText(text);
        alert("Copied: " + text);
    }

    function verifyPayment(){
        let code = document.getElementById("mpesa-code").value.trim();
        if(code.length < 5){ alert("Enter valid code"); return; }
        document.getElementById("success-message").style.display = "block";
        document.getElementById("mpesa-code").value = "";
    }
</script>
</body>
</html>
