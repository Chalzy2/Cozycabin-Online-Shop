        border-radius: 12px; background: var(--gold);
        color: #000; font-weight: 900; font-size: 1rem;
        cursor: pointer; text-transform: uppercase;
        letter-spacing: 1px; transition: 0.3s;
    }

    button:hover { background: #fff; transform: translateY(-2px); }

    #qrcode { text-align: center; margin-top: 25px; }
    #qrcode img { background: white; padding: 10px; border-radius: 12px; }

    .note { text-align: center; color: #666; font-size: 0.8rem; margin-top: 20px; text-transform: uppercase; }
