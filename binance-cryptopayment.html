<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozycabin | Crypto Gateway</title>
<style>
    :root {
        --gold: #d4af37;
        --deep-black: #050505;
        --surface: #0d0d0d;
    }

    body {
        margin: 0; padding: 20px;
        background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        color: white;
        font-family: 'Segoe UI', sans-serif;
    }

    .container {
        max-width: 400px; margin: auto;
        background: var(--surface);
        padding: 30px; border-radius: 24px;
        border: 1px solid #222;
        box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    h1 { text-align: center; color: var(--gold); font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 20px; }

    select {
        width: 100%; padding: 16px; margin-bottom: 15px;
        background: #111; border: 1px solid #333;
        border-radius: 12px; color: white;
        font-size: 1rem; outline: none; cursor: pointer;
    }

    .wallet {
        background: #000; padding: 20px; border-radius: 12px;
        border: 1px solid var(--gold); text-align: center;
        word-break: break-all; font-family: monospace;
        margin: 20px 0; color: var(--gold);
    }

    button {
        width: 100%; padding: 18px; border: none;
        border-radius: 12px; background: var(--gold);
        color: #000; font-weight: 900; font-size: 1rem;
        cursor: pointer; text-transform: uppercase;
        letter-spacing: 1px; transition: 0.3s;
    }

    button:hover { background: #fff; transform: translateY(-2px); }

    #qrcode { text-align: center; margin-top: 25px; }
    #qrcode img { background: white; padding: 10px; border-radius: 12px; }

    .note { text-align: center; color: #666; font-size: 0.8rem; margin-top: 20px; text-transform: uppercase; }

    .referral-box {
        margin-top: 30px; padding: 20px; border-top: 1px solid #222;
        text-align: center;
    }
</style>
</head>
<body>

<div class="container">
    <h1>SECURE CRYPTO</h1>
    
    <select id="coin" onchange="updateNetworks()">
        <option value="usdt">USDT</option>
        <option value="eth">Ethereum</option>
        <option value="bnb">BNB</option>
        <option value="sol">Solana</option>
    </select>

    <select id="network" onchange="updateWallet()"></select>

    <div class="wallet" id="walletBox">...</div>

    <button onclick="copyWallet()">Copy Address</button>

    <div id="qrcode"></div>

    <div class="note">
        Confirm transaction on WhatsApp after sending.
    </div>

    <div class="referral-box">
        <a href="https://www.binance.com/activity/referral-entry/CPA?ref=CPA_00TZ2L450F" 
           style="color:var(--gold); text-decoration:none; font-weight:bold; font-size:0.9rem;">
           CREATE BINANCE ACCOUNT →
        </a>
    </div>
</div>

<script>
const wallets = {
    usdt: {
        "TRC20 (Best for Fees)": "TFTBNKnkn2Uin7m3NNVNZ1FJJFGW2HwdLj",
        "BEP20 / BSC": "0x2545509dbe9fa7e19af80352238281ba3391f781",
        "ERC20 / Ethereum": "0x2545509dbe9fa7e19af80352238281ba3391f781"
    },
    btc: {
        "Bitcoin (Native Segwit)": "bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh",
        "Bitcoin (Taproot)": "bc1p0xlxgs6yy6n82436r6k62v7n8a543888y984r8n4x0l4"
    }
};

function updateNetworks() {
    const coin = document.getElementById("coin").value;
    const networkSelect = document.getElementById("network");
    
    // Clear existing
    networkSelect.innerHTML = "";

    // Add new
    for (const network in wallets[coin]) {
        const option = document.createElement("option");
        option.value = network;
        option.textContent = network;
        networkSelect.appendChild(option);
    }
    
    // Update address immediately
    updateWallet();
}

function updateWallet() {
    const coin = document.getElementById("coin").value;
    const network = document.getElementById("network").value;
    const wallet = wallets[coin][network];
    
    const walletBox = document.getElementById("walletBox");
    walletBox.innerText = wallet;
    
    // Update QR Code
    document.getElementById("qrcode").innerHTML = 
        `<img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${wallet}">`;
}

function copyWallet() {
    const wallet = document.getElementById("walletBox").innerText;
    navigator.clipboard.writeText(wallet).then(() => {
        alert("Wallet address copied to clipboard!");
    });
}

// Initialize on load
window.onload = updateNetworks;
</script>

    

</script>

</body>
</html>
