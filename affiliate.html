<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Cozycabin Affiliate Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:
    radial-gradient(circle at top,
    rgba(255,215,0,0.08),
    transparent 35%),
    #0a0a0a;

    min-height:100vh;
}

.glass-card{
    background:rgba(17,17,17,0.96);
    backdrop-filter:blur(12px);
}

.gold-glow{
    box-shadow:0 0 20px rgba(255,215,0,0.12);
}

.green-glow{
    box-shadow:0 0 18px rgba(45,183,66,0.18);
}

.cozy-btn{
    transition:all .2s ease;
}

.cozy-btn:hover{
    opacity:.92;
}

.cozy-btn:active{
    transform:scale(.97);
}

input::placeholder{
    color:#666;
}

input:focus{
    box-shadow:0 0 0 1px #ffd700;
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#333;
    border-radius:20px;
}

</style>
</head>

<body class="text-white font-sans flex items-center justify-center p-4">

<!-- MAIN -->
<div class="w-full max-w-md">

    <!-- LOGO -->
    <div class="text-center mb-6">

        <div class="flex justify-center mb-4">
            <div class="w-20 h-20 rounded-3xl bg-[#111] border border-[#2a2a2a] flex items-center justify-center gold-glow">
                <span class="text-[#ffd700] text-3xl font-black">
                    C
                </span>
            </div>
        </div>

        <h1 class="text-4xl font-black tracking-[5px] text-[#ffd700] uppercase">
            COZYCABIN
        </h1>

        <p class="text-gray-500 text-[11px] uppercase tracking-[5px] mt-2">
            Affiliate Partner Portal
        </p>

    </div>

    <!-- CARD -->
    <div class="glass-card border border-[#222] rounded-[28px] p-6 gold-glow">

        <!-- TITLE -->
        <div class="text-center mb-5">

            <h2 class="text-2xl font-bold uppercase text-white">
                Join Affiliate Program
            </h2>

            <p class="text-gray-500 text-sm mt-2 leading-relaxed">
                Generate referral links, monitor sales and withdraw earnings instantly through M-Pesa.
            </p>

        </div>

        <!-- GOOGLE -->
        <button
        class="cozy-btn w-full bg-white text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl mb-5">

            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#EA4335"
                d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l3.227-3.227C18.216 1.414 15.48 0 12.24 0 5.48 0 0 5.48 0 12.24s5.48 12.24 12.24 12.24c7.05 0 11.732-4.957 11.732-11.94 0-.804-.085-1.42-.19-1.97H12.24z"/>
            </svg>

            CONTINUE WITH GOOGLE

        </button>

        <!-- DIVIDER -->
        <div class="flex items-center mb-5">

            <div class="flex-1 border-t border-[#222]"></div>

            <span class="px-3 text-[10px] uppercase tracking-[3px] text-gray-600">
                Secure Login
            </span>

            <div class="flex-1 border-t border-[#222]"></div>

        </div>

        <!-- FORM -->
        <form class="space-y-4">

            <!-- EMAIL -->
            <div>

                <label class="block text-[11px] text-[#ffd700] uppercase tracking-[3px] mb-2 font-bold">
                    Email Address
                </label>

                <input
                type="email"
                placeholder="name@gmail.com"
                class="w-full bg-[#151515] border border-[#333] rounded-2xl px-5 py-4 outline-none text-white"/>

            </div>

            <!-- MPESA -->
            <div>

                <label class="block text-[11px] text-[#ffd700] uppercase tracking-[3px] mb-2 font-bold">
                    M-Pesa Number
                </label>

                <input
                type="tel"
                placeholder="0712345678"
                class="w-full bg-[#151515] border border-[#333] rounded-2xl px-5 py-4 outline-none text-white"/>

            </div>

            <!-- PASSWORD -->
            <div>

                <label class="block text-[11px] text-[#ffd700] uppercase tracking-[3px] mb-2 font-bold">
                    Password
                </label>

                <input
                type="password"
                placeholder="Minimum 6 characters"
                class="w-full bg-[#151515] border border-[#333] rounded-2xl px-5 py-4 outline-none text-white"/>

            </div>

            <!-- BUTTON -->
            <button
            type="submit"
            class="cozy-btn w-full bg-[#ffd700] text-black font-black py-4 rounded-2xl uppercase tracking-[3px] shadow-xl mt-2">

                SIGN IN WITH EMAIL

            </button>

        </form>

        <!-- REGISTER -->
        <div class="text-center mt-6">

            <span class="text-gray-500 text-sm">
                Don't have an affiliate account yet?
            </span>

            <a href="#"
            class="text-[#ffd700] underline font-bold ml-1">
                Register Here
            </a>

        </div>

    </div>

    <!-- FOOTER -->
    <div class="text-center mt-6">

        <p class="text-[10px] uppercase tracking-[4px] text-gray-600">
            © COZYCABIN ONLINE SHOP 2026
        </p>

    </div>

</div>

</body>
</html>
