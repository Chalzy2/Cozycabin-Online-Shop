<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozycabin Intro Animation</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background:#000;
  width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-family:'Arial',sans-serif;
  overflow:hidden;
}
#intro-canvas {
  width:100%;
  max-width:960px;
  aspect-ratio:16/9;
  display:block;
  cursor:pointer;
}
#controls {
  margin-top:14px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}
.ctrl-btn {
  background:rgba(255,138,0,0.12);
  border:1px solid rgba(255,138,0,0.4);
  color:#ff8a00;
  padding:9px 20px;
  border-radius:10px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:.5px;
  transition:.2s;
}
.ctrl-btn:hover { background:rgba(255,138,0,0.25); }
.ctrl-btn.active { background:#ff8a00; color:#000; }
#export-info {
  margin-top:10px;
  font-size:11px;
  color:#555;
  text-align:center;
}
</style>
</head>
<body>

<canvas id="intro-canvas"></canvas>

<div id="controls">
  <button class="ctrl-btn active" onclick="INTRO.replay()">▶ Play Intro</button>
  <button class="ctrl-btn" onclick="INTRO.toggleLoop()">🔁 Loop</button>
  <button class="ctrl-btn" onclick="INTRO.exportFrames()">📹 Record WebM</button>
</div>
<div id="export-info">Click canvas to replay · 5 sec · 30fps · 1920×1080 · Orange #FF8A00 · Blue #00B2FF · Silver #C0C0C0</div>

<script>
var INTRO = (function() {

  var canvas = document.getElementById('intro-canvas');
  var ctx    = canvas.getContext('2d');

  // Internal render resolution — full HD
  var W = 1920, H = 1080;
  canvas.width  = W;
  canvas.height = H;

  var FPS      = 30;
  var DURATION = 5.0;   // seconds
  var FRAMES   = Math.round(FPS * DURATION);

  var frame    = 0;
  var rafId    = null;
  var looping  = false;
  var lastTime = 0;

  // ── COLORS ──
  var ORANGE  = '#FF8A00';
  var BLUE    = '#00B2FF';
  var SILVER  = '#C0C0C0';
  var GOLD    = '#FFD700';
  var WHITE   = '#FFFFFF';

  // ── EASING ──
  function easeOut(t)   { return 1 - Math.pow(1-t, 3); }
  function easeIn(t)    { return t * t * t; }
  function easeInOut(t) { return t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
  function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }
  function norm(t,s,e)  { return clamp((t-s)/(e-s), 0, 1); }

  // ── PARTICLE SYSTEM ──
  var particles = [];
  function spawnParticles(x, y, count, color, speed) {
    for (var i=0; i<count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var v = speed * (0.4 + Math.random() * 0.6);
      particles.push({
        x:x, y:y,
        vx: Math.cos(angle)*v,
        vy: Math.sin(angle)*v,
        life: 1, decay: 0.02+Math.random()*0.03,
        size: 2+Math.random()*4,
        color: color
      });
    }
  }
  function updateParticles() {
    for (var i=particles.length-1; i>=0; i--) {
      var p=particles[i];
      p.x+=p.vx; p.y+=p.vy;
      p.vy+=0.3;
      p.life-=p.decay;
      if (p.life<=0) { particles.splice(i,1); continue; }
      ctx.globalAlpha = p.life * 0.8;
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ── GLOW HELPER ──
  function setGlow(color, blur) {
    ctx.shadowColor = color;
    ctx.shadowBlur  = blur;
  }
  function clearGlow() { ctx.shadowColor='transparent'; ctx.shadowBlur=0; }

  // ── DRAW SPARK STREAK ── Step 1 (0–0.6s)
  function drawSparkStreak(t) {
    var p = easeOut(norm(t, 0, 0.6));
    if (p <= 0) return;

    var x = W * 0.08 + (W * 0.84) * p;
    var y = H * 0.5;

    // Trail
    var grad = ctx.createLinearGradient(W*0.08, y, x, y);
    grad.addColorStop(0,   'transparent');
    grad.addColorStop(0.6, 'rgba(255,138,0,0.1)');
    grad.addColorStop(1,   'rgba(255,138,0,0.8)');
    ctx.strokeStyle = grad;
    ctx.lineWidth   = 3;
    setGlow(ORANGE, 20);
    ctx.beginPath();
    ctx.moveTo(W*0.08, y);
    ctx.lineTo(x, y);
    ctx.stroke();

    // Spark head
    setGlow(ORANGE, 40);
    var sparkGrad = ctx.createRadialGradient(x,y,0, x,y,30);
    sparkGrad.addColorStop(0, '#fff');
    sparkGrad.addColorStop(0.3, ORANGE);
    sparkGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = sparkGrad;
    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI*2);
    ctx.fill();

    // Spawn particles from spark
    if (frame % 2 === 0) spawnParticles(x, y, 3, ORANGE, 4);
    clearGlow();
  }

  // ── DRAW LETTER REVEAL ── Step 2 (0.6–1.6s)
  var LETTERS = ['C','O','Z','Y','C','A','B','I','N'];
  function drawLetterReveal(t) {
    var totalDur = 1.0;
    var perLetter = totalDur / LETTERS.length;
    var centerX = W / 2;
    var centerY = H / 2;

    LETTERS.forEach(function(letter, i) {
      var start = 0.6 + i * perLetter;
      var end   = start + perLetter + 0.3;
      var p     = easeOut(norm(t, start, end));
      if (p <= 0) return;

      var totalW  = 820;
      var letterX = centerX - totalW/2 + (i / (LETTERS.length-1)) * totalW;
      var letterY = centerY + 20;

      // Slide in from left
      var slideX = letterX - 60 * (1-p);
      var alpha  = p;

      ctx.globalAlpha = alpha;
      ctx.font = 'bold 160px "Arial Black", Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Metallic gradient per letter
      var lGrad = ctx.createLinearGradient(slideX-50, letterY-70, slideX+50, letterY+70);
      lGrad.addColorStop(0,   '#fff');
      lGrad.addColorStop(0.3, ORANGE);
      lGrad.addColorStop(0.6, SILVER);
      lGrad.addColorStop(1,   ORANGE);
      ctx.fillStyle = lGrad;
      setGlow(ORANGE, 25 * p);
      ctx.fillText(letter, slideX, letterY);

      // Spark on letter arrival
      if (p > 0.01 && p < 0.15 && frame % 3 === 0) {
        spawnParticles(slideX, letterY, 4, ORANGE, 6);
      }
    });
    ctx.globalAlpha = 1;
    clearGlow();
  }

  // ── FULL WORD GLOWED ── Step 3 (1.6–2.2s)
  function drawFullWordGlowed(t) {
    var p = easeInOut(norm(t, 1.6, 2.2));
    if (p <= 0) return;

    var pulse = 1 + 0.06 * Math.sin(t * 12);

    ctx.save();
    ctx.translate(W/2, H/2+20);
    ctx.scale(pulse, pulse);

    ctx.font = 'bold 160px "Arial Black", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Premium metallic fill
    var grad = ctx.createLinearGradient(-420, -70, 420, 70);
    grad.addColorStop(0,    ORANGE);
    grad.addColorStop(0.25, '#fff');
    grad.addColorStop(0.5,  ORANGE);
    grad.addColorStop(0.75, SILVER);
    grad.addColorStop(1,    ORANGE);
    ctx.fillStyle = grad;
    setGlow(ORANGE, 40 * p);
    ctx.globalAlpha = p;
    ctx.fillText('COZYCABIN', 0, 0);

    ctx.restore();
    ctx.globalAlpha = 1;
    clearGlow();
  }

  // ── ENERGY SWIRL ── Step 4 (2.2–2.8s)
  var swirlAngle = 0;
  function drawEnergySwirl(t) {
    var p = easeOut(norm(t, 2.2, 2.8));
    if (p <= 0) return;
    swirlAngle = t * 4;

    var cx = W/2, cy = H/2;
    var rx = 280 * p, ry = 110 * p;

    // Draw multiple swirl arcs — orange and blue
    [
      { color:ORANGE, offset:0,        width:6 },
      { color:BLUE,   offset:Math.PI,  width:4 },
      { color:SILVER, offset:Math.PI/2,width:2 }
    ].forEach(function(swirl) {
      var grad = ctx.createLinearGradient(cx-rx, cy, cx+rx, cy);
      grad.addColorStop(0, 'transparent');
      grad.addColorStop(0.4, swirl.color);
      grad.addColorStop(0.6, '#fff');
      grad.addColorStop(1, 'transparent');

      ctx.strokeStyle = grad;
      ctx.lineWidth   = swirl.width;
      ctx.globalAlpha = p * 0.9;
      setGlow(swirl.color, 25);

      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, swirlAngle + swirl.offset, 0, Math.PI*2);
      ctx.stroke();
    });

    // Swirl tip sparkle
    if (frame % 2 === 0) {
      var tipX = cx + rx * Math.cos(swirlAngle);
      var tipY = cy + ry * Math.sin(swirlAngle);
      spawnParticles(tipX, tipY, 2, ORANGE, 5);
      var tipX2 = cx + rx * Math.cos(swirlAngle + Math.PI);
      var tipY2 = cy + ry * Math.sin(swirlAngle + Math.PI);
      spawnParticles(tipX2, tipY2, 2, BLUE, 5);
    }
    ctx.globalAlpha = 1;
    clearGlow();
  }

  // ── DRAW HOUSE ── Step 5–6 (2.8–3.8s)
  function drawHouse(t) {
    var p = easeOut(norm(t, 2.8, 3.5));
    if (p <= 0) return;

    var cx = W/2, cy = H/2;
    var scale = p;
    var riseY = 80 * (1-p); // rises from below

    ctx.save();
    ctx.translate(cx, cy + riseY);
    ctx.scale(scale, scale);
    ctx.globalAlpha = p;

    var hs = 130; // house scale

    // House glow halo
    var haloGrad = ctx.createRadialGradient(0,0,0, 0,0,hs*1.6);
    haloGrad.addColorStop(0,   'rgba(255,138,0,0.15)');
    haloGrad.addColorStop(0.5, 'rgba(0,178,255,0.06)');
    haloGrad.addColorStop(1,   'transparent');
    ctx.fillStyle = haloGrad;
    ctx.beginPath();
    ctx.arc(0, 0, hs*1.6, 0, Math.PI*2);
    ctx.fill();

    // House body
    ctx.fillStyle = '#2a1a08';
    ctx.strokeStyle = ORANGE;
    ctx.lineWidth = 3;
    setGlow(ORANGE, 20);
    ctx.beginPath();
    ctx.rect(-hs*0.6, -hs*0.25, hs*1.2, hs*0.8);
    ctx.fill();
    ctx.stroke();

    // Roof
    ctx.fillStyle = '#1a1008';
    ctx.strokeStyle = ORANGE;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-hs*0.75, -hs*0.25);
    ctx.lineTo(0, -hs*0.85);
    ctx.lineTo(hs*0.75, -hs*0.25);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Chimney
    ctx.fillStyle = '#1a1008';
    ctx.strokeStyle = ORANGE;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.rect(hs*0.25, -hs*0.78, hs*0.18, hs*0.28);
    ctx.fill();
    ctx.stroke();

    // Windows (warm glow)
    [[−hs*0.38, -hs*0.05], [hs*0.38, -hs*0.05]].forEach(function(pos) {
      var wGrad = ctx.createRadialGradient(pos[0], pos[1], 0, pos[0], pos[1], hs*0.22);
      wGrad.addColorStop(0,   'rgba(255,220,100,0.95)');
      wGrad.addColorStop(0.5, 'rgba(255,160,30,0.6)');
      wGrad.addColorStop(1,   'transparent');
      ctx.fillStyle = wGrad;
      ctx.beginPath();
      ctx.arc(pos[0], pos[1], hs*0.22, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,220,100,0.9)';
      ctx.fillRect(pos[0]-hs*0.14, pos[1]-hs*0.14, hs*0.28, hs*0.28);
    });

    // Door
    ctx.fillStyle = '#3d2010';
    ctx.strokeStyle = ORANGE;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.rect(-hs*0.12, hs*0.2, hs*0.24, hs*0.35);
    ctx.fill();
    ctx.stroke();
    // Door arch
    ctx.beginPath();
    ctx.arc(-hs*0.0, hs*0.2, hs*0.12, Math.PI, 0);
    ctx.fill();
    ctx.stroke();

    ctx.restore();
    ctx.globalAlpha = 1;
    clearGlow();
  }

  // ── SWIRL SETTLES ── Step 6 (3.3–3.8s) — tighter swirl around house
  function drawSwirl(t) {
    var p = easeInOut(norm(t, 2.2, 4.3));
    if (p <= 0) return;

    var settle = easeInOut(norm(t, 3.3, 3.8)); // tightens
    swirlAngle = t * 3.5;
    var cx = W/2, cy = H/2;
    var rx = (280 - 100*settle) * Math.max(0, norm(t,2.2,2.8));
    if (norm(t,2.8,4.3) > 0) rx = 180 - 30*settle;
    var ry = rx * 0.4;

    [
      { color:ORANGE, off:0,          w:7 },
      { color:BLUE,   off:Math.PI,    w:5 },
      { color:'#fff', off:Math.PI*.6, w:2 }
    ].forEach(function(s) {
      ctx.strokeStyle = s.color;
      ctx.lineWidth   = s.w;
      ctx.globalAlpha = p * 0.85;
      setGlow(s.color, 30);
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, swirlAngle + s.off, 0, Math.PI*2);
      ctx.stroke();
    });

    ctx.globalAlpha = 1;
    clearGlow();
  }

  // ── TEXT ALIGN ── Step 7 (3.8–4.3s)
  function drawTextAlign(t) {
    var p = easeOut(norm(t, 3.8, 4.3));
    if (p <= 0) return;

    var cx = W/2;
    var dropY = H/2 + 200 + 30*(1-p);

    ctx.globalAlpha = p;

    // COZYCABIN big
    var grad = ctx.createLinearGradient(cx-300, dropY-60, cx+300, dropY+20);
    grad.addColorStop(0,   ORANGE);
    grad.addColorStop(0.3, '#fff');
    grad.addColorStop(0.6, ORANGE);
    grad.addColorStop(1,   SILVER);
    ctx.fillStyle   = grad;
    ctx.font = 'bold 110px "Arial Black", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    setGlow(ORANGE, 30*p);
    ctx.fillText('COZYCABIN', cx, dropY - 30);

    // Tagline
    ctx.fillStyle = SILVER;
    ctx.font = '600 34px Arial, sans-serif';
    ctx.letterSpacing = '6px';
    setGlow(BLUE, 12*p);
    ctx.fillText('SMART LIVING SOLUTIONS', cx, dropY + 30);

    ctx.globalAlpha = 1;
    clearGlow();
  }

  // ── FINAL LOGO + FADE ── Step 8 (4.3–5.0s)
  function drawFinalLogo(t) {
    var p = norm(t, 4.3, 4.9);
    var fadeOut = 1 - norm(t, 4.7, 5.0);
    var glow = 1 + 0.3 * Math.sin(t * 20); // intensify glow

    var cx = W/2;

    ctx.globalAlpha = Math.min(p, fadeOut);

    // Final COZYCABIN
    var grad = ctx.createLinearGradient(cx-300, H/2+160, cx+300, H/2+240);
    grad.addColorStop(0,   ORANGE);
    grad.addColorStop(0.3, '#fff');
    grad.addColorStop(0.6, ORANGE);
    grad.addColorStop(1,   SILVER);
    ctx.fillStyle   = grad;
    ctx.font = 'bold 110px "Arial Black", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    setGlow(ORANGE, 50 * glow * Math.min(p, fadeOut));
    ctx.fillText('COZYCABIN', cx, H/2 + 190);

    ctx.fillStyle = SILVER;
    ctx.font = '600 34px Arial, sans-serif';
    setGlow(BLUE, 18 * glow * Math.min(p, fadeOut));
    ctx.fillText('SMART LIVING SOLUTIONS', cx, H/2 + 250);

    // Final sparkle burst
    if (p > 0.1 && p < 0.5 && frame % 3 === 0) {
      spawnParticles(cx + (Math.random()-0.5)*400, H/2+190, 3, ORANGE, 8);
      spawnParticles(cx + (Math.random()-0.5)*200, H/2+190, 2, BLUE, 6);
    }

    ctx.globalAlpha = 1;
    clearGlow();
  }

  // ── BACKGROUND ──
  function drawBackground(t) {
    // Deep black base
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // Subtle radial glow in centre
    var intensity = 0.06 + 0.04 * Math.sin(t * 2);
    var bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.6);
    bgGrad.addColorStop(0,   'rgba(255,138,0,' + intensity + ')');
    bgGrad.addColorStop(0.5, 'rgba(0,178,255,' + (intensity*0.5) + ')');
    bgGrad.addColorStop(1,   'transparent');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);
  }

  // ── MAIN RENDER ──
  function render(t) {
    drawBackground(t);
    updateParticles();

    // Layer all steps
    if (t < 2.4) drawSparkStreak(t);     // Step 1
    if (t > 0.5) drawLetterReveal(t);    // Step 2
    if (t > 1.5) drawFullWordGlowed(t);  // Step 3
    if (t > 2.1) drawSwirl(t);           // Step 4 + 6 combined
    if (t > 2.7) drawHouse(t);           // Step 5
    if (t > 3.7) drawTextAlign(t);       // Step 7
    if (t > 4.2) drawFinalLogo(t);       // Step 8

    // Scan-line vignette
    var vGrad = ctx.createRadialGradient(W/2,H/2,H*0.3, W/2,H/2,H*0.85);
    vGrad.addColorStop(0,   'transparent');
    vGrad.addColorStop(1,   'rgba(0,0,0,0.55)');
    ctx.fillStyle = vGrad;
    ctx.fillRect(0,0,W,H);
  }

  // ── ANIMATION LOOP ──
  function tick(timestamp) {
    if (!lastTime) lastTime = timestamp;
    var delta = (timestamp - lastTime) / 1000;
    lastTime  = timestamp;

    frame++;
    var t = frame / FPS;

    render(t);

    if (t < DURATION) {
      rafId = requestAnimationFrame(tick);
    } else {
      // Hold last frame for 0.5s then optionally loop
      setTimeout(function() {
        if (looping) replay();
      }, 500);
    }
  }

  function replay() {
    if (rafId) cancelAnimationFrame(rafId);
    frame    = 0;
    lastTime = 0;
    particles = [];
    rafId    = requestAnimationFrame(tick);
  }

  function toggleLoop() {
    looping = !looping;
    document.querySelector('.ctrl-btn:nth-child(2)').classList.toggle('active', looping);
  }

  // ── WEBM RECORDING ──
  function exportFrames() {
    var infoEl = document.getElementById('export-info');
    if (!window.MediaRecorder) { alert('MediaRecorder not supported in this browser.'); return; }
    var stream  = canvas.captureStream(FPS);
    var mime    = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
    var recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8000000 });
    var chunks  = [];
    recorder.ondataavailable = function(e) { if (e.data.size>0) chunks.push(e.data); };
    recorder.onstop = function() {
      var blob = new Blob(chunks, { type: mime });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href   = url;
      a.download = 'cozycabin-intro.webm';
      a.click();
      infoEl.textContent = '✅ Saved cozycabin-intro.webm (' + (blob.size/1024/1024).toFixed(1) + ' MB)';
    };
    recorder.start();
    replay();
    infoEl.textContent = '🔴 Recording… (5 seconds)';
    setTimeout(function() { recorder.stop(); }, (DURATION + 0.8) * 1000);
  }

  // ── INIT ──
  canvas.addEventListener('click', replay);
  render(0);
  replay();

  return { replay:replay, toggleLoop:toggleLoop, exportFrames:exportFrames };

})();
</script>
</body>
</html>
