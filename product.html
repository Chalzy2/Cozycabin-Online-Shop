<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozycabin Product</title>

<script src="products.js"></script>

<script>

window.onload = function(){

const params =
new URLSearchParams(window.location.search);

const productId =
params.get("id");

const product =
products[productId];

if(product){

document.getElementById("product-name").innerText =
product.name;

document.getElementById("product-price").innerText =
product.price;

document.getElementById("product-image").src =
product.image;

document.getElementById("product-category").innerText =
product.category;

}

};

</script>

</head>

<body style="background:black;color:white;font-family:sans-serif;padding:20px;">

<h1 id="product-name"></h1>

<img
id="product-image"
style="width:100%;max-width:350px;border-radius:20px;">

<h2 id="product-price"></h2>

<p id="product-category"></p>

</body>

</html>
