<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozycabin | Products</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .nav-header {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-start;
        }
        .home-btn {
            background: rgba(255, 255, 255, 0.07);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body class="product-page">

   <!-- TOP NAVIGATION -->

    <div class="nav-header">

        <button
        onclick="goBack()"
        class="home-btn">

        ← Back to Shop

        </button>

    </div>

    <!-- PRODUCTS CONTAINER -->

    <div id="products-container"></div>

</div>

<script src="products.js"></script>

<script>

function goBack(){

window.history.back();

}

</script>

</body>
